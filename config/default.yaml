# ============================================================
# Algo Bot — default configuration
# Override per-environment via config/{env}.yaml
# ============================================================

mode: paper                 # paper | demo | live
timezone: Asia/Kolkata

market:
  exchange: NSE
  trading_hours:
    open: "09:15"
    close: "15:30"
  pre_open: "09:00"
  post_close: "15:40"

universe:
  size: 500
  market_cap_min_cr: 500    # min market cap in Crore INR
  daily_turnover_min_cr: 5  # min avg daily turnover (INR Cr) over last 30 days
  price_min: 50             # ₹
  price_max: 10000          # ₹
  rebalance: monthly        # monthly universe refresh
  exclude_sectors:           # optional: skip specific sectors
    []

data:
  source_primary: yfinance
  source_secondary: nsepython
  history_years: 5
  storage_dir: data/
  database_url: sqlite:///data/algobot.db

backtest:
  start_date: "2020-01-01"
  end_date: "2025-04-30"
  initial_capital: 1000000  # ₹10 Lakh notional for backtest
  costs:
    brokerage_pct: 0.0003   # 0.03% (Zerodha equity delivery)
    stt_pct: 0.0025         # 0.25% on sell side (delivery)
    exchange_pct: 0.0000325 # 0.00325%
    gst_pct: 0.18           # on (brokerage + exchange)
    stamp_duty_pct: 0.00015 # 0.015%, buy side only
    slippage_bps: 5         # 5 bps
  walk_forward:
    train_years: 3
    test_months: 6
    step_months: 6

risk:
  per_trade_pct: 0.01           # max 1% equity at risk per trade
  per_strategy_daily_pct: 0.05  # max 5% daily loss per strategy
  portfolio_max_drawdown: 0.12  # peak-to-trough; circuit breaker halts below -this
  circuit_daily_loss_pause: 0.03   # pause new entries rest of session if daily P&L ≤ -this
  circuit_5day_loss_half_size: 0.07  # halve new entry sizes if 5d rolling loss ≤ -this
  circuit_consecutive_stops_to_disable: 3
  circuit_strategy_disable_days: 5
  max_single_position_pct: 0.20 # max 20% of portfolio in one stock
  max_sector_pct: 0.35          # max 35% in one sector
  half_kelly: true              # use half-Kelly sizing
  kelly_cap: 0.20               # never exceed 20% Kelly fraction
  atr_window: 14
  stop_atr_multiple:
    momentum: 2.0
    mean_reversion: 1.5
    pairs: 1.0
    multi_factor: 2.5
  trailing_stop_activate_atr: 1.5

strategies:
  active:
    - momentum
    - mean_reversion
    - pairs
    - multi_factor
    - sentiment_momentum

  momentum:
    lookback_months: 12
    skip_months: 1
    rebalance: monthly
    top_n: 5

  mean_reversion:
    bb_period: 20
    bb_std: 2.0
    rsi_period: 14
    rsi_entry: 30
    rsi_exit: 50
    max_hold_days: 10

  pairs:
    cointegration_lookback_days: 252
    z_entry: 2.0
    z_exit: 0.5
    max_hold_days: 30
    p_value_max: 0.05
    p_value_break: 0.10

  multi_factor:
    rebalance: quarterly
    factors: [value, momentum, quality, low_vol]
    factor_weights: [0.25, 0.25, 0.25, 0.25]
    top_quintile: 0.20
    stop_loss_pct: 0.08

  sentiment_momentum:
    sentiment_filter_long: 0.0   # only long if sentiment >= 0
    sentiment_filter_short: 0.0  # only short if sentiment <= 0
    sentiment_smoothing_days: 7

regime:
  vol_window: 60
  trend_window: 200
  high_vol_threshold: 0.25      # annualised vol
  trending_score_threshold: 1.5

sentiment:
  sources:
    - moneycontrol
    - economic_times
    - livemint
    - reddit_indian_stockmarket
  scrape_interval_minutes: 60
  rate_limit_per_second: 1
  finbert_model: ProsusAI/finbert
  cache_dir: data/sentiment/

orders:
  broker: kite                  # kite | upstox | angel | paper
  paper_starting_capital: 1000000
  paper_circuit_limit_pct: 0    # 0 = off; e.g. 0.2 rejects fills if |close-prev|/prev >= 20% (coarse proxy)
  retry_max: 3
  retry_backoff_seconds: 2

monitor:
  dashboard_port: 8501
  alert_telegram: true
  daily_summary_time: "16:30"

logging:
  level: INFO
  rotation: "10 MB"
  retention: "30 days"
  format: json
